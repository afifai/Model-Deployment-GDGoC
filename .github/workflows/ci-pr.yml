name: CI/CD - Pull Request

on:
  pull_request:
    branches: [main]

jobs:
  lint-test-evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Train model (for tests)
        run: python training/train.py

      - name: Run tests
        run: pytest tests/ -v

      # --- Get baseline metrics from main (committed by ci-main) ---
      - name: Get baseline metrics
        run: |
          git show origin/main:training/artifacts/metrics.json > training/artifacts/baseline_metrics.json 2>/dev/null || echo "{}" > training/artifacts/baseline_metrics.json

      # --- Train & evaluate PR model ---
      - name: Train PR model
        run: python training/train.py --output training/artifacts/model_pr.pkl

      - name: Evaluate PR model
        run: |
          python training/evaluate.py \
            --model training/artifacts/model_pr.pkl \
            --output-dir training/artifacts/pr

      - name: Compare metrics
        run: |
          BASELINE_ARG=""
          if [ -s training/artifacts/baseline_metrics.json ] && [ "$(cat training/artifacts/baseline_metrics.json)" != "{}" ]; then
            BASELINE_ARG="--baseline training/artifacts/baseline_metrics.json"
          fi
          python scripts/compare_metrics.py \
            --candidate training/artifacts/pr/metrics.json \
            $BASELINE_ARG > training/artifacts/comparison.json

      - name: Generate report
        run: |
          BASELINE_ARG=""
          if [ -s training/artifacts/baseline_metrics.json ] && [ "$(cat training/artifacts/baseline_metrics.json)" != "{}" ]; then
            BASELINE_ARG="--baseline training/artifacts/baseline_metrics.json"
          fi
          python scripts/generate_report.py \
            --metrics training/artifacts/pr/metrics.json \
            --model training/artifacts/model_pr.pkl \
            --dataset training/data/dataset_sms_spam_v1.csv \
            --cm-image training/artifacts/pr/confusion_matrix.png \
            $BASELINE_ARG \
            > training/artifacts/report.md

      - name: Upload confusion matrix
        uses: actions/upload-artifact@v4
        with:
          name: confusion-matrix
          path: training/artifacts/pr/confusion_matrix.png

      - name: Post PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: training/artifacts/report.md
